services:
  backend:
    build:
      context: ./Backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - EXECUTION_SERVICE_URL=http://runner:5001/execute
      - AI_PROVIDER=${AI_PROVIDER:-disabled}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
    depends_on:
      - runner

  runner:
    build:
      context: ./container
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
    # This container runs untrusted code. Do NOT deploy without limits.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
